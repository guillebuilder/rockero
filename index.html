<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🎸 Rockero</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#0d0d1a;--card:rgba(255,255,255,.06);--border:rgba(255,255,255,.1);
  --dim:rgba(255,255,255,.55);--cn:#e74c3c;--ci:#3498db;--ct:#9b59b6;
  --pop:#e91e8c;--cm:#f39c12;--green:#2ecc71;--red:#e74c3c;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:#fff;min-height:100vh;overflow-x:hidden;}

/* COVER */
#s-cover{height:100vh;display:flex;flex-direction:column;align-items:stretch;justify-content:flex-start;padding:0;overflow:hidden;}
.cover-photo-wrap{width:100%;flex:1;overflow:hidden;background:#0d0d1a;display:flex;align-items:center;justify-content:center;min-height:0;}
.cover-photo{width:100%;height:100%;object-fit:contain;object-position:center center;}
.cover-text-wrap{width:100%;background:#0d0d1a;
  padding:20px 24px 32px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.cover-title{font-size:clamp(2.4rem,11vw,3.8rem);font-weight:900;letter-spacing:-1px;line-height:1;
  background:linear-gradient(135deg,#e74c3c 0%,#f39c12 50%,#9b59b6 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
.cover-sub{font-size:.72rem;color:rgba(255,255,255,.6);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:24px;}
.cover-rule{font-size:.68rem;color:rgba(255,255,255,.4);margin-top:14px;line-height:1.8;}

/* SCREENS */
.screen{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:16px 14px;}
.screen.hidden{display:none!important;}

/* SETUP */
.game-title{font-size:2rem;font-weight:900;background:linear-gradient(135deg,#e74c3c,#9b59b6,#3498db);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;margin-bottom:4px;}
.subtitle{color:var(--dim);font-size:.78rem;text-align:center;margin-bottom:28px;}
.setup-form{display:flex;flex-direction:column;gap:10px;width:100%;max-width:360px;margin-bottom:22px;}
.team-input{display:flex;align-items:center;gap:12px;background:var(--card);
  border:1px solid var(--border);border-radius:16px;padding:13px 16px;}
.team-emoji{font-size:1.4rem;}
.team-input input{flex:1;background:none;border:none;color:#fff;font-size:1rem;font-weight:700;outline:none;}
.team-input input::placeholder{color:var(--dim);font-weight:400;}

/* BUTTONS */
.btn{padding:14px 18px;border:none;border-radius:14px;font-size:.95rem;font-weight:800;
  cursor:pointer;transition:transform .1s,opacity .2s;width:100%;display:block;text-align:center;}
.btn:active{transform:scale(0.96);}
.btn:disabled{opacity:.35;cursor:default;pointer-events:none;}
.btn-primary{background:linear-gradient(135deg,#8e44ad,#3498db);color:#fff;}
.btn-ghost{background:var(--card);border:1px solid var(--border);color:#fff;}

/* SCORES */
.scores-bar{display:flex;gap:8px;width:100%;max-width:580px;margin-bottom:10px;}
.score-card{flex:1;background:var(--card);border:1.5px solid var(--border);
  border-radius:12px;padding:8px 10px;text-align:center;transition:all .3s;min-width:0;}
.score-card.active{border-color:rgba(155,89,182,.7);background:rgba(155,89,182,.15);}
.s-name{font-size:.65rem;color:var(--dim);margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.s-val{font-size:1.5rem;font-weight:900;}

/* JOKERS */
.jokers-row{display:flex;justify-content:space-between;width:100%;max-width:580px;margin-bottom:7px;padding:0 2px;}
.joker-set{display:flex;align-items:center;gap:4px;font-size:.65rem;color:var(--dim);}
.j-icon{font-size:.85rem;transition:opacity .3s;}
.j-icon.used{opacity:.15;}
.turn-label{font-size:.75rem;color:var(--dim);margin-bottom:10px;}
.turn-label strong{color:#fff;}

/* BOARD - 5 columns */
.board{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;width:100%;max-width:580px;}
.cat-head{text-align:center;padding:7px 2px;font-size:.48rem;font-weight:800;
  text-transform:uppercase;letter-spacing:.2px;border-radius:8px;line-height:1.3;}
.q-cell{background:var(--card);border:1.5px solid var(--border);border-radius:8px;
  padding:11px 2px;text-align:center;font-size:.88rem;font-weight:900;
  cursor:pointer;transition:all .15s;user-select:none;min-height:52px;}
.q-cell.done{opacity:.12;cursor:default;pointer-events:none;}
.nivel-badge{font-size:.38rem;color:var(--dim);text-transform:uppercase;letter-spacing:.3px;margin-top:2px;}
.cn .cat-head{background:rgba(231,76,60,.2);color:var(--cn);}
.ci .cat-head{background:rgba(52,152,219,.2);color:var(--ci);}
.ct .cat-head{background:rgba(155,89,182,.2);color:var(--ct);}
.cp .cat-head{background:rgba(233,30,140,.2);color:var(--pop);}
.cm .cat-head{background:rgba(243,156,18,.2);color:var(--cm);}

/* QUESTION */
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:12px;width:100%;max-width:500px;}
.cat-badge{padding:4px 11px;border-radius:20px;font-size:.65rem;font-weight:800;text-transform:uppercase;}
.q-type-tag{font-size:.58rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
.q-pts{font-size:1.35rem;font-weight:900;margin-left:auto;}
.q-body{font-size:clamp(.95rem,3.8vw,1.2rem);font-weight:700;text-align:center;
  line-height:1.55;width:100%;max-width:500px;margin-bottom:14px;white-space:pre-line;}

/* TIMER */
.timer-wrap{position:relative;width:68px;height:68px;margin-bottom:12px;flex-shrink:0;}
.timer-svg{transform:rotate(-90deg);}
.t-bg{fill:none;stroke:rgba(255,255,255,.08);stroke-width:6;}
.t-arc{fill:none;stroke:var(--ct);stroke-width:6;stroke-linecap:round;
  transition:stroke-dashoffset 1s linear,stroke .5s;}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;font-weight:900;}

/* HINT ROW */
.q-top-row{display:flex;align-items:center;justify-content:space-between;
  width:100%;max-width:500px;margin-bottom:10px;gap:10px;}
.hint-card{background:rgba(243,156,18,.12);border:1px solid rgba(243,156,18,.3);
  border-radius:10px;padding:8px 12px;font-size:.76rem;flex:1;display:none;line-height:1.4;}
.hint-card.show{display:block;}
.hint-btn-sm{white-space:nowrap;padding:8px 11px;border:none;border-radius:10px;
  background:linear-gradient(135deg,#d35400,#f39c12);color:#fff;
  font-size:.72rem;font-weight:800;cursor:pointer;flex-shrink:0;}
.hint-btn-sm:disabled{opacity:.35;cursor:default;}

/* OPTIONS */
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:500px;margin-bottom:12px;}
.opt-btn{display:flex;align-items:center;gap:9px;background:var(--card);
  border:2px solid var(--border);border-radius:12px;padding:11px 11px;
  font-size:.84rem;font-weight:700;color:#fff;cursor:pointer;transition:all .15s;
  text-align:left;line-height:1.3;width:100%;}
.opt-btn:active{transform:scale(0.96);}
.opt-btn.locked{cursor:default;pointer-events:none;}
.opt-btn.correct{background:rgba(46,204,113,.25);border-color:#2ecc71;color:#2ecc71;}
.opt-btn.wrong{background:rgba(231,76,60,.2);border-color:#e74c3c;color:#e74c3c;}
.opt-btn.neutral{opacity:.32;}
.opt-letter{min-width:25px;height:25px;border-radius:7px;display:flex;align-items:center;
  justify-content:center;font-size:.74rem;font-weight:900;background:rgba(255,255,255,.1);flex-shrink:0;}
.opt-btn.correct .opt-letter{background:rgba(46,204,113,.3);}
.opt-btn.wrong .opt-letter{background:rgba(231,76,60,.3);}
.next-btn-wrap{width:100%;max-width:500px;}

/* STEAL */
.steal-banner{background:linear-gradient(135deg,#d35400,#f39c12);
  border-radius:18px;padding:18px 22px;text-align:center;margin-bottom:16px;width:100%;max-width:440px;}
.steal-title{font-size:1.7rem;font-weight:900;margin-bottom:3px;}
.steal-sub{font-size:.88rem;font-weight:600;}

/* REVEAL */
.answer-card{background:rgba(46,204,113,.12);border:2px solid rgba(46,204,113,.4);
  border-radius:16px;padding:20px;text-align:center;margin-bottom:14px;width:100%;max-width:500px;}
.answer-label{font-size:.68rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
.answer-text{font-size:clamp(1.1rem,4.5vw,1.55rem);font-weight:900;color:var(--green);white-space:pre-line;}
.result-msg{font-size:.88rem;text-align:center;margin-bottom:14px;line-height:1.5;
  font-style:italic;color:rgba(255,255,255,.85);}
.spotify-btn{display:inline-flex;align-items:center;gap:8px;background:#1db954;
  color:#000;padding:10px 20px;border-radius:25px;font-weight:800;font-size:.88rem;
  text-decoration:none;margin-bottom:16px;border:none;cursor:pointer;}
.spotify-btn:hover{opacity:.9;}

/* FINAL */
.crown{font-size:3.8rem;margin-bottom:7px;}
.winner-label{font-size:.8rem;color:var(--dim);margin-bottom:3px;}
.winner-name{font-size:clamp(1.5rem,6vw,2rem);font-weight:900;
  background:linear-gradient(135deg,#f39c12,#e74c3c);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:24px;text-align:center;}
.final-scores{display:flex;gap:12px;width:100%;max-width:380px;margin-bottom:28px;}
.final-card{flex:1;background:var(--card);border:1.5px solid var(--border);
  border-radius:16px;padding:16px 10px;text-align:center;}
.final-card.champ{border-color:rgba(243,156,18,.5);background:rgba(243,156,18,.1);}
.f-name{font-size:.72rem;color:var(--dim);margin-bottom:3px;}
.f-score{font-size:1.9rem;font-weight:900;}
.f-pts{font-size:.68rem;color:var(--dim);margin-top:1px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .3s ease both;}
@keyframes pulseRed{0%,100%{color:#fff}50%{color:var(--red)}}
.pulse-red{animation:pulseRed .55s infinite;}
@keyframes popIn{0%{transform:scale(.8);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.pop-in{animation:popIn .28s ease both;}
</style>
</head>

      {type:'COLABORACIÓN',q:'¿Qué famosa collab hicieron\nQueen + David Bowie?',hint:'El título habla de presión. La musical, no la atmosférica.',opts:['Under Pressure','Under the Bridge','Pressure Drop','Somebody to Love'],cor:0,ans:'Under Pressure',sp:'queen david bowie under pressure'},
      {type:'COLABORACIÓN',q:'Shakira + BZRP Session #53 incluye una línea\ndonde compara un Ferrari con...',hint:'Un auto pequeño y humilde de la marca Renault.',opts:['un Twingo','un Renault 12','un Fiat 600','un Clio'],cor:0,ans:'Un Twingo ("cambia un Ferrari por un Twingo")',sp:'shakira bizarrap session 53'},
      {type:'COLABORACIÓN',q:'¿Qué canción hicieron juntos\nDuki, Khea, Cazzu y varios más?',hint:'Describe a una persona difícil de controlar.',opts:['Loca','Wacha','Goteo','Además de Mí'],cor:0,ans:'Loca (Khea, Cazzu, Duki)',sp:'khea cazzu duki loca'},
      {type:'COLABORACIÓN',q:'Shakira y Alejandro Sanz hicieron juntos en 2005\nel hit "La ___". ¿De qué país es Alejandro Sanz?',hint:'País europeo. La madre patria. Hablan castellano.',opts:['España','Colombia','México','Argentina'],cor:0,ans:'España — "La Tortura" (Shakira ft. Alejandro Sanz)',sp:'shakira alejandro sanz la tortura'},
      {type:'COLABORACIÓN',q:'¿Cuál es el nombre de la canción que\nhicieron juntos Dua Lipa y Elton John en 2021?',hint:'Temperatura opuesta al calor. "Cold ___".',opts:['Cold Heart','Tiny Dancer','Your Song','Crocodile Rock'],cor:0,ans:'Cold Heart (PNAU Remix) — 2021',sp:'dua lipa elton john cold heart'},
    ]
  }
};

// ── STATE ─────────────────────────────────────────────────────────
const G={
  teams:[{name:'Equipo 1',score:0,jokers:2},{name:'Equipo 2',score:0,jokers:2}],
  cur:0,q:null,done:new Set(),timer:null,wrongResult:false,stealWon:false,gameCats:[]
};
const CIRC=175.93;

function shuffle(a){return [...a].sort(()=>Math.random()-.5);}
function shuffleOpts(q){
  const q2={...q,opts:[...q.opts]};
  const correct=q2.opts[q2.cor];
  for(let i=q2.opts.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [q2.opts[i],q2.opts[j]]=[q2.opts[j],q2.opts[i]];
  }
  q2.cor=q2.opts.indexOf(correct);
  return q2;
}
function pickCat(p){
  const n1=shuffle(p.n1).slice(0,2);
  const n2=shuffle(p.n2).slice(0,2);
  const n3=shuffle(p.n3).slice(0,1);
  const pts=[100,200,300,400,500];
  const all=[...n1,...n2,...n3];
  all.forEach((q,i)=>{ q=Object.assign({},q); all[i]=q; q.pts=pts[i]; q.nivel=i<2?1:i<4?2:3; });
  return {id:p.id,cls:p.cls,name:p.name,emoji:p.emoji,color:p.color,qs:all};
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}
function syncUI(){
  const [a,b]=G.teams;
  ['bn0','bn1'].forEach((id,i)=>document.getElementById(id).textContent=G.teams[i].name);
  ['bv0','bv1'].forEach((id,i)=>document.getElementById(id).textContent=G.teams[i].score);
  document.getElementById('sc0').classList.toggle('active',G.cur===0);
  document.getElementById('sc1').classList.toggle('active',G.cur===1);
  document.getElementById('turn-name').textContent=G.teams[G.cur].name;
  document.getElementById('jn0').textContent=G.teams[0].name+':';
  document.getElementById('jn1').textContent=G.teams[1].name+':';
  ['j0a','j0b'].forEach((id,i)=>document.getElementById(id).classList.toggle('used',i>=G.teams[0].jokers));
  ['j1a','j1b'].forEach((id,i)=>document.getElementById(id).classList.toggle('used',i>=G.teams[1].jokers));
  document.getElementById('rn0').textContent=G.teams[0].name;
  document.getElementById('rn1').textContent=G.teams[1].name;
  document.getElementById('rv0').textContent=G.teams[0].score;
  document.getElementById('rv1').textContent=G.teams[1].score;
}

function goSetup(){document.getElementById('s-cover').style.display='none';show('s-setup');}
function startGame(){
  G.teams[0]={name:document.getElementById('t1').value.trim()||'Equipo 1',score:0,jokers:2};
  G.teams[1]={name:document.getElementById('t2').value.trim()||'Equipo 2',score:0,jokers:2};
  G.cur=0; G.done=new Set();
  G.gameCats=[pickCat(POOLS.cn),pickCat(POOLS.ci),pickCat(POOLS.ct),pickCat(POOLS.cp),pickCat(POOLS.cm)];
  renderBoard(); syncUI(); show('s-board');
}

function renderBoard(){
  const el=document.getElementById('board');
  el.innerHTML='';
  G.gameCats.forEach(c=>{
    const h=document.createElement('div');
    h.className='cat-head '+c.cls;
    h.innerHTML=c.emoji+'<br>'+c.name;
    el.appendChild(h);
  });
  [0,1,2,3,4].forEach(ri=>{
    G.gameCats.forEach(c=>{
      const q=c.qs[ri];
      const key=c.id+'-'+ri;
      const cell=document.createElement('div');
      const niv=ri<2?'N1 🎵':ri<4?'N2 📝':'N3 🤝';
      cell.className='q-cell '+c.cls+(G.done.has(key)?' done':'');
      cell.innerHTML='<div>'+q.pts+'</div><div class="nivel-badge">'+niv+'</div>';
      if(!G.done.has(key)) cell.onclick=()=>openQ(c,q,key);
      el.appendChild(cell);
    });
  });
}

function openQ(cat,q,key){
  G.q={...shuffleOpts(q),key}; G.wrongResult=false;
  const badge=document.getElementById('q-badge');
  badge.textContent=cat.emoji+' '+cat.name;
  badge.style.background=cat.color+'30'; badge.style.color=cat.color;
  document.getElementById('q-type').textContent=q.type;
  document.getElementById('q-pts').textContent='+'+q.pts;
  document.getElementById('q-body').textContent=q.q;
  document.getElementById('hint-txt').textContent=q.hint;
  document.getElementById('hint-card').classList.remove('show');
  document.getElementById('next-wrap').style.display='none';
  const hb=document.getElementById('hint-btn');
  const j=G.teams[G.cur].jokers;
  hb.disabled=(j<=0); hb.textContent='💡 Pista ('+j+')';
  buildOpts('opts-grid',G.q,false,chosen=>{
    stopTimer();
    G.done.add(G.q.key);
    if(chosen===G.q.cor){G.teams[G.cur].score+=G.q.pts; G.wrongResult=false;}
    else G.wrongResult=true;
    document.getElementById('next-wrap').style.display='block';
  });
  show('s-question');
  startTimer(30,'t-arc','t-num',()=>{
    G.done.add(G.q.key); G.wrongResult=true;
    lockOpts('opts-grid',-1,-1);
    document.getElementById('next-wrap').style.display='block';
    document.getElementById('rv-msg').textContent=rMsg(MSGS.timeout);
  },'var(--ct)');
}

// revealCorrect=false means don't show green on wrong answers (for steal mechanic)
function buildOpts(gridId,q,revealCorrect,onPick){
  const grid=document.getElementById(gridId);
  grid.innerHTML='';
  const letters=['A','B','C','D'];
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='opt-btn pop-in';
    btn.style.animationDelay=(i*0.07)+'s';
    btn.innerHTML='<span class="opt-letter">'+letters[i]+'</span><span>'+opt+'</span>';
    btn.onclick=()=>{
      stopTimer();
      // Show chosen wrong without revealing correct (for steal setup)
      if(revealCorrect) lockOpts(gridId,q.cor,i);
      else lockOpts(gridId,i===q.cor?i:-1,i===q.cor?-1:i);
      onPick(i);
    };
    grid.appendChild(btn);
  });
}

function lockOpts(gridId,correct,wrong){
  document.getElementById(gridId).querySelectorAll('.opt-btn').forEach((b,i)=>{
    b.classList.add('locked');
    if(i===correct) b.classList.add('correct');
    else if(i===wrong) b.classList.add('wrong');
    else b.classList.add('neutral');
  });
}

function useJoker(){
  const t=G.teams[G.cur];
  if(t.jokers<=0)return;
  t.jokers--;
  document.getElementById('hint-card').classList.add('show');
  const hb=document.getElementById('hint-btn');
  hb.disabled=true; hb.textContent='💡 Usada';
  syncUI();
}

function afterAnswer(){
  if(G.wrongResult) showSteal();
  else reveal(rMsg(MSGS.ok));
}

function showSteal(){
  const st=1-G.cur;
  document.getElementById('steal-sub').textContent=G.teams[st].name+' — 10 segundos para robar';
  document.getElementById('steal-body').textContent=G.q.q;
  document.getElementById('steal-hint').textContent=G.q.hint;
  document.getElementById('steal-next').style.display='none';
  // Build steal opts WITH reveal (steal team sees correct after answering)
  buildOpts('steal-opts',G.q,true,chosen=>{
    stopTimer();
    if(chosen===G.q.cor){G.teams[st].score+=Math.floor(G.q.pts/2); G.stealWon=true;}
    else G.stealWon=false;
    document.getElementById('steal-next').style.display='block';
  });
  show('s-steal');
  startTimer(10,'st-arc','st-num',()=>{
    G.stealWon=false;
    lockOpts('steal-opts',G.q.cor,-1);
    document.getElementById('steal-next').style.display='block';
  },'var(--cm)');
}

function afterSteal(){
  const st=1-G.cur;
  if(G.stealWon) reveal(rMsg(MSGS.steal_ok));
  else reveal(rMsg(MSGS.steal_fail));
}

function reveal(msg){
  document.getElementById('rv-q').textContent=G.q.q;
  document.getElementById('rv-ans').textContent=G.q.ans;
  document.getElementById('rv-msg').textContent=msg;
  const slink=document.getElementById('spotify-link');
  if(G.q.sp){
    slink.href='https://open.spotify.com/search/'+encodeURIComponent(G.q.sp);
    slink.style.display='inline-flex';
  } else slink.style.display='none';
  syncUI(); show('s-reveal');
}

function next(){
  G.cur=1-G.cur;
  const total=G.gameCats.reduce((s,c)=>s+c.qs.length,0);
  if(G.done.size>=total){showFinal();return;}
  renderBoard(); syncUI(); show('s-board');
}

function showFinal(){
  const [a,b]=G.teams;
  let wi=-1,wn='¡Empate (los dos perdieron igual)!',cr='🤝';
  if(a.score>b.score){wi=0;wn=a.name;cr='🏆';}
  if(b.score>a.score){wi=1;wn=b.name;cr='🏆';}
  document.getElementById('crown').textContent=cr;
  document.getElementById('w-name').textContent=wn;
  document.getElementById('fn0').textContent=a.name; document.getElementById('fv0').textContent=a.score;
  document.getElementById('fn1').textContent=b.name; document.getElementById('fv1').textContent=b.score;
  document.getElementById('fc0').classList.toggle('champ',wi===0);
  document.getElementById('fc1').classList.toggle('champ',wi===1);
  show('s-final');
}

function restart(){
  G.teams[0].score=0;G.teams[0].jokers=2;
  G.teams[1].score=0;G.teams[1].jokers=2;
  G.cur=0;G.done=new Set();
  G.gameCats=[pickCat(POOLS.cn),pickCat(POOLS.ci),pickCat(POOLS.ct),pickCat(POOLS.cp),pickCat(POOLS.cm)];
  renderBoard();syncUI();show('s-board');
}

function startTimer(secs,arcId,numId,onEnd,stroke){
  stopTimer();
  let left=secs;
  const arc=document.getElementById(arcId);
  const num=document.getElementById(numId);
  arc.style.stroke=stroke; arc.style.strokeDashoffset='0';
  num.textContent=secs; num.classList.remove('pulse-red');
  G.timer=setInterval(()=>{
    left--;
    num.textContent=left;
    arc.style.strokeDashoffset=CIRC*(1-left/secs);
    if(left<=5){arc.style.stroke='var(--red)';num.classList.add('pulse-red');}
    if(left<=0){stopTimer();onEnd();}
  },1000);
}
function stopTimer(){
  if(G.timer){clearInterval(G.timer);G.timer=null;}
  const n=document.getElementById('t-num');
  if(n)n.classList.remove('pulse-red');
}
</script>
